<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Urban Charm — Cosmetics & Lighting</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
  :root {
    --olive: #2e2d22;
    --olive-light: #3a3929;
    --beige: #c9b99a;
    --beige-light: #e8ddd0;
    --beige-pale: #f5f0ea;
    --cream: #faf7f3;
    --dark: #1a1a13;
    --text-muted: #7a7660;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--olive);
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 14px 40px;
    background: var(--olive);
    color: white;
  }

  .hero {
    padding: 120px 40px;
    background: var(--olive);
    color: white;
    text-align: center;
  }

  .products {
    padding: 80px 40px;
    background: var(--beige-pale);
  }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 22px;
  }

  .product-card {
    background: white;
    overflow: hidden;
  }

  .product-img-wrap {
    aspect-ratio: 1;
    background: #f8f8f8;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .product-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .product-info {
    padding: 16px;
  }

  .product-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
  }

  .product-order {
    border: 1px solid var(--beige);
    padding: 6px 12px;
    text-decoration: none;
    color: black;
  }
</style>
</head>

<body>

<nav>
  <div>Urban Charm</div>
</nav>

<section class="hero">
  <h1>Urban Charm</h1>
  <p>Premium Lighting & Cosmetics</p>
</section>

<!-- LIGHTING -->
<section class="products">
<h2>Lighting</h2>

<div class="products-grid">

<!-- Crystal -->
<div class="product-card">
  <div class="product-img-wrap">
    <img src="images/crystal-lamp.jpg">
  </div>
  <div class="product-info">
    <h3>Crystal Lamp</h3>
    <div class="product-footer">
      <span>৳1250</span>
      <a href="#">Order</a>
    </div>
  </div>
</div>

<!-- Rose Lamp -->
<div class="product-card">
  <div class="product-img-wrap">
    <img src="images/rose-lamp.jpg">
  </div>
  <div class="product-info">
    <h3>Rose Lamp</h3>
    <div class="product-footer">
      <span>৳800</span>
      <a href="#">Order</a>
    </div>
  </div>
</div>

<!-- Bunny -->
<div class="product-card">
  <div class="product-img-wrap">
    <img src="images/bunny-light.jpg">
  </div>
  <div class="product-info">
    <h3>Bunny Light</h3>
    <div class="product-footer">
      <span>৳700</span>
      <a href="#">Order</a>
    </div>
  </div>
</div>

<!-- 🌹 NEW PRODUCT ADDED -->
<div class="product-card">
  <div class="product-img-wrap">
    <img src="images/rose-string.jpg">
  </div>
  <div class="product-info">
    <h3>Rose String Lights</h3>
    <div class="product-footer">
      <span>৳450</span>
      <a href="https://wa.me/8801998421007?text=Hi, I want to order the Rose String Lights">Order</a>
    </div>
  </div>
</div>

</div>
</section>

<!-- COSMETICS -->
<section class="products">
<h2>Cosmetics</h2>

<div class="products-grid">

<div class="product-card">
  <div class="product-img-wrap">
    <img src="images/snail-essence.jpg">
  </div>
  <div class="product-info">
    <h3>Snail Essence</h3>
    <div class="product-footer">
      <span>৳1300</span>
      <a href="#">Order</a>
    </div>
  </div>
</div>

<div class="product-card">
  <div class="product-img-wrap">
    <img src="images/sun-cream.jpg">
  </div>
  <div class="product-info">
    <h3>Sun Cream</h3>
    <div class="product-footer">
      <span>৳950</span>
      <a href="#">Order</a>
    </div>
  </div>
</div>

</div>
</section>

</body>
</html>
